name: Sideload APK

# Personal-fork workflow: builds a debug-signed release APK on every push to
# master and publishes it as a GitHub Release, so it can be downloaded and
# sideloaded straight from a phone browser without any local Flutter/adb setup.

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.4
          cache: true

      - run: flutter pub get

      # Informative only -- a real compile error will also fail the build
      # step below, which is the actual release gate.
      - name: Analyze
        run: flutter analyze
        continue-on-error: true

      - name: Test
        run: flutter test
        continue-on-error: true

      # Without this, release builds fall back to Gradle's debug signing
      # config (see android/app/build.gradle), which auto-generates a new
      # random debug keystore per machine -- meaning every CI run would sign
      # with a different key, and Android refuses to install an "update"
      # signed with a different certificate than what's already on the
      # device. This decodes a stable keystore generated once for this fork,
      # into the exact path/format android/app/build.gradle already expects.
      - name: Set up sideload signing key
        if: ${{ secrets.SIDELOAD_KEYSTORE_BASE64 != '' }}
        env:
          SIDELOAD_KEYSTORE_BASE64: ${{ secrets.SIDELOAD_KEYSTORE_BASE64 }}
          SIDELOAD_KEYSTORE_PASSWORD: ${{ secrets.SIDELOAD_KEYSTORE_PASSWORD }}
        run: |
          mkdir -p fastlane/metadata/envfiles
          echo "$SIDELOAD_KEYSTORE_BASE64" | base64 -d > fastlane/metadata/envfiles/keys.jks
          cat > fastlane/metadata/envfiles/key.properties <<EOF
          storePassword=$SIDELOAD_KEYSTORE_PASSWORD
          keyPassword=$SIDELOAD_KEYSTORE_PASSWORD
          keyAlias=wgerforksideload
          storeFile=../../fastlane/metadata/envfiles/keys.jks
          EOF

      - name: Build release APK
        run: flutter build apk --release

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Sideload build ${{ github.run_number }}
          body: ${{ github.event.head_commit.message }}
          prerelease: true
          files: build/app/outputs/flutter-apk/app-release.apk
